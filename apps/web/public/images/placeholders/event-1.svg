<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="evbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0d1116"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#evbg)"/>
  <!-- Exhibition hall floor -->
  <rect x="0" y="550" width="1200" height="150" fill="#1a1f2a"/>
  <rect x="0" y="545" width="1200" height="10" fill="#2d3748"/>
  <!-- Booth structures -->
  <g transform="translate(100, 200)">
    <rect x="0" y="100" width="250" height="250" fill="#2d3748" rx="8"/>
    <rect x="0" y="0" width="250" height="100" fill="#7F9C31" rx="8"/>
    <text x="125" y="65" fill="#FFFFFF" font-family="Inter, Arial" font-size="28" font-weight="700" text-anchor="middle">JHONROB</text>
    <rect x="20" y="120" width="80" height="100" fill="#1a202c" rx="4"/>
    <rect x="120" y="120" width="110" height="60" fill="#1a202c" rx="4"/>
    <rect x="120" y="200" width="110" height="80" fill="#3d4a5c" rx="4"/>
  </g>
  <!-- Second booth -->
  <g transform="translate(450, 180)">
    <rect x="0" y="120" width="300" height="270" fill="#2d3748" rx="8"/>
    <rect x="0" y="0" width="300" height="120" fill="#C88A2A" rx="8"/>
    <text x="150" y="75" fill="#FFFFFF" font-family="Inter, Arial" font-size="32" font-weight="700" text-anchor="middle">AGRISHOW</text>
    <rect x="20" y="150" width="120" height="150" fill="#1a202c" rx="4"/>
    <rect x="160" y="150" width="120" height="150" fill="#1a202c" rx="4"/>
    <circle cx="80" cy="225" r="40" fill="#3d4a5c" stroke="#5a6b7d" stroke-width="2"/>
    <circle cx="220" cy="225" r="40" fill="#3d4a5c" stroke="#5a6b7d" stroke-width="2"/>
  </g>
  <!-- Third booth -->
  <g transform="translate(850, 220)">
    <rect x="0" y="80" width="250" height="230" fill="#2d3748" rx="8"/>
    <rect x="0" y="0" width="250" height="80" fill="#4a5568" rx="8"/>
    <text x="125" y="50" fill="#FFFFFF" font-family="Inter, Arial" font-size="20" font-weight="600" text-anchor="middle">PARCEIRO</text>
    <rect x="30" y="100" width="190" height="120" fill="#1a202c" rx="4"/>
  </g>
  <!-- People silhouettes -->
  <g fill="#4a5568">
    <ellipse cx="200" cy="520" rx="20" ry="8"/>
    <ellipse cx="200" cy="470" rx="15" ry="25"/>
    <circle cx="200" cy="430" r="18"/>
    <ellipse cx="350" cy="520" rx="20" ry="8"/>
    <ellipse cx="350" cy="470" rx="15" ry="25"/>
    <circle cx="350" cy="430" r="18"/>
    <ellipse cx="550" cy="530" rx="22" ry="9"/>
    <ellipse cx="550" cy="475" rx="17" ry="28"/>
    <circle cx="550" cy="432" r="20"/>
    <ellipse cx="700" cy="520" rx="20" ry="8"/>
    <ellipse cx="700" cy="470" rx="15" ry="25"/>
    <circle cx="700" cy="430" r="18"/>
    <ellipse cx="900" cy="525" rx="20" ry="8"/>
    <ellipse cx="900" cy="475" rx="15" ry="25"/>
    <circle cx="900" cy="435" r="18"/>
  </g>
  <!-- Ceiling lights -->
  <g fill="#FFFFFF" opacity="0.15">
    <rect x="150" y="50" width="200" height="8" rx="4"/>
    <rect x="500" y="50" width="200" height="8" rx="4"/>
    <rect x="850" y="50" width="200" height="8" rx="4"/>
  </g>
  <!-- Event badge -->
  <rect x="50" y="620" width="200" height="50" fill="#C88A2A" rx="8"/>
  <text x="150" y="655" fill="#FFFFFF" font-family="Inter, Arial" font-size="20" font-weight="700" text-anchor="middle">FEIRA 2026</text>
</svg>
