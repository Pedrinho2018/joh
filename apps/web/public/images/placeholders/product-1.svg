<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0d1116"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3d4a5c"/>
      <stop offset="50%" stop-color="#5a6b7d"/>
      <stop offset="100%" stop-color="#3d4a5c"/>
    </linearGradient>
    <linearGradient id="silo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="30%" stop-color="#718096"/>
      <stop offset="70%" stop-color="#718096"/>
      <stop offset="100%" stop-color="#4a5568"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#sky)"/>
  <!-- Ground -->
  <rect x="0" y="650" width="1200" height="150" fill="#1a1f2a"/>
  <!-- Silo 1 -->
  <ellipse cx="300" cy="180" rx="120" ry="30" fill="#5a6b7d"/>
  <rect x="180" y="180" width="240" height="470" fill="url(#silo)"/>
  <ellipse cx="300" cy="650" rx="120" ry="30" fill="#3d4a5c"/>
  <!-- Silo rings -->
  <line x1="180" y1="250" x2="420" y2="250" stroke="#2d3748" stroke-width="3"/>
  <line x1="180" y1="350" x2="420" y2="350" stroke="#2d3748" stroke-width="3"/>
  <line x1="180" y1="450" x2="420" y2="450" stroke="#2d3748" stroke-width="3"/>
  <line x1="180" y1="550" x2="420" y2="550" stroke="#2d3748" stroke-width="3"/>
  <!-- Silo 2 (larger) -->
  <ellipse cx="650" cy="120" rx="160" ry="40" fill="#6b7c8f"/>
  <rect x="490" y="120" width="320" height="530" fill="url(#silo)"/>
  <ellipse cx="650" cy="650" rx="160" ry="40" fill="#3d4a5c"/>
  <!-- Silo rings -->
  <line x1="490" y1="200" x2="810" y2="200" stroke="#2d3748" stroke-width="4"/>
  <line x1="490" y1="320" x2="810" y2="320" stroke="#2d3748" stroke-width="4"/>
  <line x1="490" y1="440" x2="810" y2="440" stroke="#2d3748" stroke-width="4"/>
  <line x1="490" y1="560" x2="810" y2="560" stroke="#2d3748" stroke-width="4"/>
  <!-- Conveyor/Elevator -->
  <rect x="850" y="100" width="60" height="550" fill="url(#metal)" rx="4"/>
  <rect x="920" y="200" width="180" height="40" fill="#4a5568" rx="4"/>
  <rect x="920" y="350" width="180" height="40" fill="#4a5568" rx="4"/>
  <rect x="920" y="500" width="180" height="40" fill="#4a5568" rx="4"/>
  <!-- Support structures -->
  <line x1="260" y1="650" x2="260" y2="720" stroke="#4a5568" stroke-width="12"/>
  <line x1="340" y1="650" x2="340" y2="720" stroke="#4a5568" stroke-width="12"/>
  <line x1="570" y1="650" x2="570" y2="740" stroke="#4a5568" stroke-width="16"/>
  <line x1="730" y1="650" x2="730" y2="740" stroke="#4a5568" stroke-width="16"/>
  <!-- Accent light -->
  <circle cx="650" cy="400" r="80" fill="#7F9C31" opacity="0.15"/>
  <!-- Branding -->
  <text x="60" y="760" fill="#7F9C31" font-family="Inter, Arial" font-size="32" font-weight="700">JHONROB</text>
  <text x="250" y="760" fill="#718096" font-family="Inter, Arial" font-size="24">Silos de Armazenagem</text>
</svg>
