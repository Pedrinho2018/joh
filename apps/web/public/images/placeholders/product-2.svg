<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2a3a"/>
      <stop offset="100%" stop-color="#0f1419"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a6b7d"/>
      <stop offset="50%" stop-color="#8a9bae"/>
      <stop offset="100%" stop-color="#5a6b7d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#sky2)"/>
  <!-- Ground -->
  <rect x="0" y="680" width="1200" height="120" fill="#1a202c"/>
  <!-- Elevator Tower -->
  <rect x="500" y="80" width="100" height="600" fill="url(#steel)"/>
  <rect x="480" y="60" width="140" height="40" fill="#6b7c8f" rx="6"/>
  <!-- Cross bracing -->
  <line x1="500" y1="140" x2="600" y2="240" stroke="#3d4a5c" stroke-width="6"/>
  <line x1="600" y1="140" x2="500" y2="240" stroke="#3d4a5c" stroke-width="6"/>
  <line x1="500" y1="280" x2="600" y2="380" stroke="#3d4a5c" stroke-width="6"/>
  <line x1="600" y1="280" x2="500" y2="380" stroke="#3d4a5c" stroke-width="6"/>
  <line x1="500" y1="420" x2="600" y2="520" stroke="#3d4a5c" stroke-width="6"/>
  <line x1="600" y1="420" x2="500" y2="520" stroke="#3d4a5c" stroke-width="6"/>
  <line x1="500" y1="560" x2="600" y2="660" stroke="#3d4a5c" stroke-width="6\/>
  <line x1="600" y1="560" x2="500" y2="660" stroke="#3d4a5c" stroke-width="6"/>
  <!-- Horizontal conveyor -->
  <rect x="100" y="620" width="400" height="50" fill="#4a5568" rx="8"/>
  <rect x="600" y="620" width="500" height="50" fill="#4a5568" rx="8"/>
  <!-- Conveyor rollers -->
  <circle cx="150" cy="645" r="18" fill="#2d3748" stroke="#5a6b7d" stroke-width="3"/>
  <circle cx="250" cy="645" r="18" fill="#2d3748" stroke="#5a6b7d" stroke-width="3"/>
  <circle cx="350" cy="645" r="18" fill="#2d3748" stroke="#5a6b7d" stroke-width="3"/>
  <circle cx="450" cy="645" r="18" fill="#2d3748" stroke="#5a6b7d" stroke-width="3"/>
  <circle cx="700" cy="645" r="18" fill="#2d3748" stroke="#5a6b7d" stroke-width="3"/>
  <circle cx="850" cy="645" r="18" fill="#2d3748" stroke="#5a6b7d" stroke-width="3"/>
  <circle cx="1000" cy="645" r="18" fill="#2d3748" stroke="#5a6b7d" stroke-width="3"/>
  <!-- Motor housing -->
  <rect x="470" y="680" width="160" height="80" fill="#3d4a5c" rx="8"/>
  <circle cx="550" cy="720" r="25" fill="#2d3748" stroke="#C88A2A" stroke-width="3"/>
  <!-- Support legs -->
  <rect x="130" y="670" width="20" height="90" fill="#4a5568"/>
  <rect x="350" y="670" width="20" height="90" fill="#4a5568"/>
  <rect x="730" y="670" width="20" height="90" fill="#4a5568"/>
  <rect x="1020" y="670" width="20" height="90" fill="#4a5568"/>
  <!-- Accent glow -->
  <circle cx="550" cy="350" r="120" fill="#C88A2A" opacity="0.1"/>
  <!-- Branding -->
  <text x="60" y="760" fill="#C88A2A" font-family="Inter, Arial" font-size="32" font-weight="700">JHONROB</text>
  <text x="260" y="760" fill="#718096" font-family="Inter, Arial" font-size="24">Elevador de Canecas</text>
</svg>
