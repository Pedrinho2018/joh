<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#151b24"/>
      <stop offset="100%" stop-color="#0d1116"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg4)"/>
  <!-- Grid pattern -->
  <g opacity="0.1" stroke="#7F9C31">
    <line x1="0" y1="200" x2="1200" y2="200" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke-width="1"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="800" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="800" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="800" stroke-width="1"/>
  </g>
  <!-- Part 1: Gear -->
  <g transform="translate(200, 180)">
    <circle cx="100" cy="100" r="90" fill="#2d3748" stroke="#5a6b7d" stroke-width="4"/>
    <circle cx="100" cy="100" r="35" fill="#1a202c"/>
    <g fill="#4a5568">
      <rect x="85" y="0" width="30" height="30" rx="4"/>
      <rect x="85" y="170" width="30" height="30" rx="4"/>
      <rect x="0" y="85" width="30" height="30" rx="4"/>
      <rect x="170" y="85" width="30" height="30" rx="4"/>
      <rect x="25" y="25" width="25" height="25" rx="3" transform="rotate(45 37 37)"/>
      <rect x="150" y="25" width="25" height="25" rx="3" transform="rotate(45 162 37)"/>
      <rect x="25" y="150" width="25" height="25" rx="3" transform="rotate(45 37 162)"/>
      <rect x="150" y="150" width="25" height="25" rx="3" transform="rotate(45 162 162)"/>
    </g>
  </g>
  <!-- Part 2: Bearing -->
  <g transform="translate(500, 200)">
    <circle cx="80" cy="80" r="75" fill="#3d4a5c" stroke="#6b7c8f" stroke-width="3"/>
    <circle cx="80" cy="80" r="50" fill="#2d3748"/>
    <circle cx="80" cy="80" r="25" fill="#1a202c" stroke="#C88A2A" stroke-width="2"/>
  </g>
  <!-- Part 3: Belt -->
  <g transform="translate(750, 160)">
    <path d="M40 0 L260 0 Q300 60 260 120 L40 120 Q0 60 40 0 Z" fill="#2d3748" stroke="#5a6b7d" stroke-width="3"/>
    <line x1="40" y1="20" x2="260" y2="20" stroke="#3d4a5c" stroke-width="2"/>
    <line x1="40" y1="40" x2="260" y2="40" stroke="#3d4a5c" stroke-width="2"/>
    <line x1="40" y1="60" x2="260" y2="60" stroke="#3d4a5c" stroke-width="2"/>
    <line x1="40" y1="80" x2="260" y2="80" stroke="#3d4a5c" stroke-width="2"/>
    <line x1="40" y1="100" x2="260" y2="100" stroke="#3d4a5c" stroke-width="2"/>
  </g>
  <!-- Part 4: Shaft -->
  <g transform="translate(150, 450)">
    <rect x="0" y="30" width="350" height="60" fill="#4a5568" rx="8"/>
    <ellipse cx="0" cy="60" rx="20" ry="50" fill="#3d4a5c"/>
    <ellipse cx="350" cy="60" rx="20" ry="50" fill="#3d4a5c"/>
    <line x1="80" y1="30" x2="80" y2="90" stroke="#3d4a5c" stroke-width="3"/>
    <line x1="160" y1="30" x2="160" y2="90" stroke="#3d4a5c" stroke-width="3"/>
    <line x1="240" y1="30" x2="240" y2="90" stroke="#3d4a5c" stroke-width="3"/>
  </g>
  <!-- Part 5: Bolts -->
  <g transform="translate(600, 450)">
    <g transform="translate(0, 0)">
      <rect x="0" y="20" width="20" height="80" fill="#5a6b7d"/>
      <polygon points="10,0 25,20 -5,20" fill="#6b7c8f"/>
    </g>
    <g transform="translate(60, 0)">
      <rect x="0" y="20" width="20" height="80" fill="#5a6b7d"/>
      <polygon points="10,0 25,20 -5,20" fill="#6b7c8f"/>
    </g>
    <g transform="translate(120, 0)">
      <rect x="0" y="20" width="20" height="80" fill="#5a6b7d"/>
      <polygon points="10,0 25,20 -5,20" fill="#6b7c8f"/>
    </g>
  </g>
  <!-- Part 6: Motor -->
  <g transform="translate(820, 420)">
    <rect x="0" y="20" width="180" height="120" fill="#3d4a5c" rx="12"/>
    <rect x="180" y="50" width="60" height="60" fill="#4a5568" rx="8"/>
    <circle cx="210" cy="80" r="20" fill="#2d3748" stroke="#7F9C31" stroke-width="3"/>
    <rect x="20" y="0" width="40" height="30" fill="#4a5568" rx="4"/>
    <rect x="80" y="0" width="40" height="30" fill="#4a5568" rx="4"/>
    <rect x="140" y="0" width="40" height="30" fill="#4a5568" rx="4"/>
  </g>
  <!-- Branding -->
  <text x="60" y="760" fill="#7F9C31" font-family="Inter, Arial" font-size="32" font-weight="700">JHONROB</text>
  <text x="260" y="760" fill="#718096" font-family="Inter, Arial" font-size="24">Peças e Componentes</text>
</svg>
